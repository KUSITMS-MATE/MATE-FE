name: 🐱 PR 디스코드 알림

on:
  pull_request:
    types: [opened, reopened, ready_for_review, closed]

jobs:
  # ──────────────────────────────────────────────
  # 🔔 PR 열림 → 리뷰 요청 알림
  # ──────────────────────────────────────────────
  notify-review:
    if: >-
      github.event.action != 'closed'
      && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: 🎲 귀여운 메시지 뽑기
        id: message
        run: |
          MESSAGES=(
            "살려주세요... 리뷰 안 하면 머지 못 해요... 🥺"
            "따끈따끈한 PR이 나왔어요! 식기 전에 리뷰해주세요~ 🍞"
            "리뷰 한 스푼만... 제발... 🥄"
            "새 PR이 당신을 기다리고 있어요. 읽씹하지 마세요 💌"
            "코드가 외로워하고 있어요. 누가 좀 봐주세요... 🐾"
            "PR 승인 버튼은 세상에서 제일 아름다운 버튼이에요 💚"
            "리뷰해주시면 오늘 하루 커피 운이 +100 됩니다 ☕✨"
            "이 PR은 사랑과 정성으로 만들어졌습니다. 감상 부탁드립니다 🎨"
            "긴급) 코드가 approve를 갈망하고 있습니다 🆘"
            "[속보] 머지 대기 중인 PR 발견! 리뷰어 급구! 📰"
          )
          INDEX=$(( RANDOM % ${#MESSAGES[@]} ))
          echo "cute_msg=${MESSAGES[$INDEX]}" >> "$GITHUB_OUTPUT"

      - name: 📨 디스코드로 리뷰 요청 보내기
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.FRONT_PR_WEBHOOK }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BODY: ${{ github.event.pull_request.body }}
          CUTE_MSG: ${{ steps.message.outputs.cute_msg }}
          CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
          ADDITIONS: ${{ github.event.pull_request.additions }}
          DELETIONS: ${{ github.event.pull_request.deletions }}
        run: |
          # PR 크기에 따른 이모지
          TOTAL_CHANGES=$(( ADDITIONS + DELETIONS ))
          if [ "$TOTAL_CHANGES" -lt 50 ]; then
            SIZE_LABEL="🍰 한입 크기"
          elif [ "$TOTAL_CHANGES" -lt 200 ]; then
            SIZE_LABEL="🍔 적당한 크기"
          elif [ "$TOTAL_CHANGES" -lt 500 ]; then
            SIZE_LABEL="🍕 꽤 큰 편"
          else
            SIZE_LABEL="🏋️ 헬스장 급 (힘내세요...)"
          fi

          # PR body 줄이기
          DESCRIPTION=$(echo "$PR_BODY" | head -c 200)
          if [ ${#PR_BODY} -gt 200 ]; then
            DESCRIPTION="${DESCRIPTION}..."
          fi
          DESCRIPTION=$(echo "$DESCRIPTION" | jq -Rs '.')

          curl -H "Content-Type: application/json" \
            -X POST \
            -d @- \
            "$DISCORD_WEBHOOK_URL" <<EOF
          {
            "username": "PR 요정 🧚",
            "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
            "content": "📢 **리뷰 요청이 도착했어요!** ${CUTE_MSG}",
            "embeds": [
              {
                "title": "📝 ${PR_TITLE}",
                "url": "${PR_URL}",
                "color": 5763719,
                "description": ${DESCRIPTION},
                "fields": [
                  {
                    "name": "👤 작성자",
                    "value": "${PR_AUTHOR}",
                    "inline": true
                  },
                  {
                    "name": "📦 PR 크기",
                    "value": "${SIZE_LABEL}",
                    "inline": true
                  },
                  {
                    "name": "📊 변경 사항",
                    "value": "\`${CHANGED_FILES}\`개 파일 | +${ADDITIONS} -${DELETIONS}",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "리뷰해주시면 복이 와요 🍀"
                },
                "timestamp": "${{ github.event.pull_request.created_at }}"
              }
            ]
          }
          EOF

          echo "✅ 리뷰 요청 알림 전송 완료!"

  # ──────────────────────────────────────────────
  # 🎉 PR 머지됨 → 축하 알림
  # ──────────────────────────────────────────────
  notify-merged:
    if: >-
      github.event.action == 'closed'
      && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: 🎲 축하 메시지 뽑기
        id: message
        run: |
          MESSAGES=(
            "코드가 무사히 새 집을 찾았어요! 이사 축하~ 🏠"
            "머지 완료! 오늘의 영웅은 바로 당신! 🦸"
            "main 브랜치가 한 뼘 더 자랐어요 🌱"
            "성공적으로 합류! 코드계의 어벤져스 결성 완료 🛡️"
            "Merge! 이 순간을 위해 살았다... 감동 🥲"
            "브랜치여 안녕... 넌 main 속에서 영원히 살 거야 💐"
            "축) 머지 기념 커피 한 잔 어때요? ☕🎊"
            "드디어 해냈다! 리뷰어분들 감사합니다 🫡✨"
          )
          INDEX=$(( RANDOM % ${#MESSAGES[@]} ))
          echo "cute_msg=${MESSAGES[$INDEX]}" >> "$GITHUB_OUTPUT"

      - name: 🎊 디스코드로 머지 축하 보내기
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.FRONT_PR_WEBHOOK }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
          CUTE_MSG: ${{ steps.message.outputs.cute_msg }}
          CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
          ADDITIONS: ${{ github.event.pull_request.additions }}
          DELETIONS: ${{ github.event.pull_request.deletions }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          curl -H "Content-Type: application/json" \
            -X POST \
            -d @- \
            "$DISCORD_WEBHOOK_URL" <<EOF
          {
            "username": "머지 축하 요정 🎉",
            "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
            "content": "🎊 **PR이 머지되었어요!** ${CUTE_MSG}",
            "embeds": [
              {
                "title": "✅ ${PR_TITLE}",
                "url": "${PR_URL}",
                "color": 2067276,
                "fields": [
                  {
                    "name": "👤 작성자",
                    "value": "${PR_AUTHOR}",
                    "inline": true
                  },
                  {
                    "name": "🔀 머지한 사람",
                    "value": "${MERGED_BY}",
                    "inline": true
                  },
                  {
                    "name": "🌿 브랜치",
                    "value": "\`${HEAD_BRANCH}\` → \`${BASE_BRANCH}\`",
                    "inline": true
                  },
                  {
                    "name": "📊 최종 변경 사항",
                    "value": "\`${CHANGED_FILES}\`개 파일 | +${ADDITIONS} -${DELETIONS}",
                    "inline": false
                  }
                ],
                "footer": {
                  "text": "수고하셨습니다! 🍀"
                },
                "timestamp": "${{ github.event.pull_request.merged_at }}"
              }
            ]
          }
          EOF

          echo "✅ 머지 축하 알림 전송 완료!"
